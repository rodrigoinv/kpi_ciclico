<script>
  // Pega aquí la URL que acabas de copiar
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbynYZbIt2uGw6BWaua3gPtRiSsB69J0CD0ry_13UOgG5B-exwTMef8MTIaV0bJ10bG4/exec";

  function cargarDatos() {
    // Usamos esta técnica para saltar las restricciones de seguridad
    const script = document.createElement('script');
    script.src = SCRIPT_URL + "?callback=procesarDatos";
    document.body.appendChild(script);
  }

  function procesarDatos(data) {
    console.log("Datos recibidos:", data);
    
    // Cálculo de pendientes (aquí usamos los nombres exactos de tus columnas)
    const pendientes = data.filter(item => parseFloat(item["DIFERENCIA"]) !== 0);
    
    // Inyectar en tus elementos (asegúrate que existan en tu HTML)
    if(document.getElementById("valor-total")) document.getElementById("valor-total").innerText = data.length;
    if(document.getElementById("valor-pendientes")) document.getElementById("valor-pendientes").innerText = pendientes.length;

    // Llenar tabla
    const tbody = document.getElementById("cuerpo-tabla");
    if(tbody) {
      tbody.innerHTML = "";
      pendientes.forEach(item => {
        tbody.innerHTML += `<tr>
          <td>${item["ITDESC"] || ''}</td>
          <td>${item["UBIEST"] || ''}</td>
          <td>${item["DIFERENCIA"] || '0'}</td>
        </tr>`;
      });
    }
  }

  window.onload = cargarDatos;
</script>
