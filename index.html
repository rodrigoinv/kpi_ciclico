<script>
// 1. URL de tu API creada
const API_URL = "https://script.google.com/macros/s/AKfycbxNg-Kbw7LCPwiA6h3YvftMnZ4lYsglT217i8kFXI2SLulQDtma2JfTLnBHHEYWSNqz/exec";

// 2. Función para cargar y calcular
async function cargarDatosDesdeSheet() {
    try {
        const response = await fetch(API_URL);
        const data = await response.json(); // Data es un arreglo de objetos

        // LÓGICA DE CÁLCULO
        // Aquí ajustamos según los nombres de columna reales de tu archivo
        const totalUbicaciones = data.length;
        const pendientes = data.filter(item => item["Diferencia"] != 0).length;
        
        // 3. ACTUALIZAR TU DISEÑO (Asumiendo IDs existentes en tu HTML)
        // Sustituye "id-de-tu-elemento" por los IDs reales que ya tienes en tu index.html
        if(document.getElementById("valor-total")) 
            document.getElementById("valor-total").innerText = totalUbicaciones;
            
        if(document.getElementById("valor-pendientes")) 
            document.getElementById("valor-pendientes").innerText = pendientes;

        console.log("Datos cargados:", data);
    } catch (e) {
        console.error("Error al conectar con Google Sheets:", e);
    }
}

// Ejecutar al iniciar
window.onload = cargarDatosDesdeSheet;
</script>
