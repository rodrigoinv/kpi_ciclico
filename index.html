<script>
  // Pega aquí la NUEVA URL que obtuviste al implementar
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxNg-Kbw7LCPwiA6h3YvftMnZ4lYsglT217i8kFXI2SLulQDtma2JfTLnBHHEYWSNqz/exec";

  function cargarDatos() {
    var script = document.createElement('script');
    // El "?callback=procesarDatos" es la clave mágica
    script.src = SCRIPT_URL + "?callback=procesarDatos";
    document.body.appendChild(script);
  }

  function procesarDatos(data) {
    console.log("Datos recibidos:", data);

    // Cálculos
    const pendientes = data.filter(item => parseFloat(item["DIFERENCIA"]) !== 0);
    
    // Inyección en tus IDs (ajusta los IDs si los tuyos son diferentes)
    if(document.getElementById("valor-total")) document.getElementById("valor-total").innerText = data.length;
    if(document.getElementById("valor-pendientes")) document.getElementById("valor-pendientes").innerText = pendientes.length;

    // Tabla
    const tbody = document.getElementById("cuerpo-tabla");
    if(tbody) {
      tbody.innerHTML = "";
      pendientes.forEach(item => {
        tbody.innerHTML += `<tr>
          <td>${item["ITDESC"]}</td>
          <td>${item["UBIEST"]}</td>
          <td>${item["DIFERENCIA"]}</td>
        </tr>`;
      });
    }
  }

  window.onload = cargarDatos;
</script>
