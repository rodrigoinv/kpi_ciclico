<script>
  // Tu URL de la API
  const API_URL = "https://script.google.com/macros/s/AKfycbxNg-Kbw7LCPwiA6h3YvftMnZ4lYsglT217i8kFXI2SLulQDtma2JfTLnBHHEYWSNqz/exec";

  async function actualizarDashboard() {
    try {
      // Usamos una técnica llamada 'no-cors' o simplemente fetch directo si el script tiene el header correcto
      const response = await fetch(API_URL);
      const data = await response.json();

      // CÁLCULOS
      const totalRegistros = data.length;
      const pendientes = data.filter(item => parseFloat(item["DIFERENCIA"]) !== 0);

      // ACTUALIZACIÓN DEL DOM (Asegúrate de que estos ID existan en tu HTML)
      // Si tus elementos tienen otros IDs, cámbialos aquí:
      if(document.getElementById("valor-total")) 
         document.getElementById("valor-total").innerText = totalRegistros;
         
      if(document.getElementById("valor-pendientes")) 
         document.getElementById("valor-pendientes").innerText = pendientes.length;

      // Llenar tabla (Asegúrate de tener un <tbody id="cuerpo-tabla">)
      const tabla = document.getElementById("cuerpo-tabla");
      if(tabla) {
        tabla.innerHTML = "";
        pendientes.forEach(item => {
          tabla.innerHTML += `<tr>
            <td>${item["ITDESC"]}</td>
            <td>${item["UBIEST"]}</td>
            <td>${item["DIFERENCIA"]}</td>
          </tr>`;
        });
      }
    } catch (error) {
      console.error("Error al cargar datos:", error);
    }
  }

  window.onload = actualizarDashboard;
</script>
