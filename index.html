<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbzVM_zbrY2rlTv6pOFV9JQKnSdtwh848BdfnNuFWpz4b9VyhjuqQhiqOlbC8MJRyBZg/exec";

  fetch(API_URL)
    .then(response => response.json())
    .then(data => {
      // 1. Cálculos automáticos
      const totalSKU = data.length;
      const pendientes = data.filter(item => parseFloat(item["DIFERENCIA"]) !== 0);

      // 2. Inyección en tu diseño (asegura que estos IDs existan en tu HTML)
      if(document.getElementById("valor-total")) 
        document.getElementById("valor-total").innerText = totalSKU;
      if(document.getElementById("valor-pendientes")) 
        document.getElementById("valor-pendientes").innerText = pendientes.length;

      // 3. Tabla dinámica
      const tbody = document.getElementById("cuerpo-tabla");
      if(tbody) {
        tbody.innerHTML = "";
        pendientes.forEach(item => {
          tbody.innerHTML += `<tr>
            <td>${item["ITDESC"] || ''}</td>
            <td>${item["UBIEST"] || ''}</td>
            <td>${item["DIFERENCIA"] || '0'}</td>
          </tr>`;
        });
      }
    })
    .catch(err => console.error("Error de conexión:", err));
</script>
